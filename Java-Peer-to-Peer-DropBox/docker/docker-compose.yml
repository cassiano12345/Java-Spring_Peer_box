version: '3'
services:

  gossip-router:
    image: openjdk:17.0.1
    container_name: gossip-router
    networks:
      - peerbox-network
    ports:
      - 12001:12001
    volumes:
      - ../build/libs:/app
    command: java -cp /app/Peer_box_file-1.0-SNAPSHOT.jar org.jgroups.stack.GossipRouter -port 12001

  peer-node1:
    image: openjdk:17.0.1
    depends_on:
      - gossip-router
    networks:
      - peerbox-network
    volumes:
      - ../build/libs:/app
      - ./peer1_data:/FICHEIROS_PEERS
    command: java -jar /app/Peer_box_file-1.0-SNAPSHOT.jar

  peer-node2:
    image: openjdk:17.0.1
    depends_on:
      - gossip-router
    networks:
      - peerbox-network
    volumes:
      - ../build/libs:/app
      - ./peer2_data:/FICHEIROS_PEERS
    command: java -jar /app/Peer_box_file-1.0-SNAPSHOT.jar

  peer-node3:
    image: openjdk:17.0.1
    depends_on:
      - gossip-router
    networks:
      - peerbox-network
    volumes:
      - ../build/libs:/app
      - ./peer3_data:/FICHEIROS_PEERS
    command: java -jar /app/Peer_box_file-1.0-SNAPSHOT.jar

networks:
  peerbox-network:
    driver: bridge