<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">

    <title>PeerBox</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body id="bodyMain" class="bg-light">

<div id="containerMain" class="container-fluid p-4">

    <div id="cardPrincipal" class="card shadow">

        <div id="headerPrincipal"
             class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h3 id="tituloSistema">📦 PeerBox</h3>

            <span id="lblEstadoServidor" class="badge bg-success fs-6">
                Ligado
            </span>

        </div>

        <div id="bodyPrincipal" class="card-body">

            <div id="painelSuperior" class="row">

                <div id="painelAcoes" class="col-md-3">

                    <div class="card">

                        <div class="card-header">
                            Ações
                        </div>

                        <div class="card-body d-grid gap-2">

                            <button id="btnAtualizarPeers" class="btn btn-primary">
                                <i class="bi bi-broadcast"></i>
                                Atualizar Peers
                            </button>

                            <button id="btnEnviarFicheiro" class="btn btn-success">
                                <i class="bi bi-upload"></i>
                                Enviar Ficheiro
                            </button>
                            <input type="file" id="inputFicheiro" hidden>

                        </div>

                    </div>

                </div>

                <div id="painelLogs" class="col-md-9">

                    <div class="card">

                        <div class="card-header">
                            Logs
                        </div>

                        <div class="card-body">

<textarea id="txtLogs"
          class="form-control"
          rows="10"
          readonly></textarea>

                        </div>

                    </div>

                </div>

            </div>

            <br>

            <div id="cardPeers" class="card">

                <div class="card-header">
                    Peers Ativos
                </div>

                <div class="card-body">

                    <table id="tblPeers" class="table table-striped table-hover">

                        <thead class="table-dark">

                        <tr>

                            <th>Nome</th>
                            <th>IP</th>
                            <th>Estado</th>
                            <th>Ficheiros</th>

                        </tr>

                        </thead>

                        <tbody id="tbodyPeers">

                        </tbody>

                    </table>

                </div>

            </div>

            <br>

            <div id="cardFicheiros" class="card">

                <div class="card-header">
                    Ficheiros Disponíveis
                </div>

                <div class="card-body">

                    <table id="tblFicheiros" class="table table-hover">

                        <thead class="table-dark">

                        <tr>

                            <th>Nome</th>
                            <th>Bytes</th>
                            <th>Peer</th>
                            <th>Chunks</th>
                            <th>Ações</th>

                        </tr>

                        </thead>

                        <tbody id="tbodyFicheiros">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>

</html>
